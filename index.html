<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flujos de Comunicación — Grupo Educación</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #080808;
      --surface: #111111;
      --border: #2a2a2a;
      --text: #f0ede6;
      --muted: #999;
      --accent-ge: #c8a96e;
      --accent-ra: #6eadc8;
      --accent-fj: #e8802a;
      --accent-hb: #6ec8a0;
      --accent-bi: #c8896e;
      --accent-tic: #8e6ec8;
      --accent-th: #c8c26e;
      --accent-rse: #6ec8c8;
      --accent-com: #d46eb0;
      --accent-otro: #aaaaaa;
      --green: #4caf72;
      --red: #c86e6e;
      --blue: #6eadc8;
      --canal: #e8c97a;
      --dept: #7ac4e8;
    }

    html,
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: 0.5;
    }

    /* ── HEADER ── */
    header {
      width: 100%;
      max-width: 960px;
      padding: 52px 40px 0;
    }

    .header-label {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    h1 {
      font-family: 'Fraunces', serif;
      font-weight: 300;
      font-size: clamp(20px, 3vw, 32px);
      line-height: 1.2;
      color: var(--text);
    }

    /* ── TABS ── */
    .tabs-wrap {
      width: 100%;
      max-width: 960px;
      padding: 28px 40px 0;
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      margin-top: 28px;
    }

    .tab {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 10px 24px 14px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      margin-bottom: -1px;
      white-space: nowrap;
    }

    .tab:hover {
      color: var(--text);
    }

    .tab.active {
      color: var(--text);
      border-bottom-color: var(--green);
    }

    .tab-num {
      color: var(--green);
      margin-right: 8px;
    }

    /* ── FLOW PANEL ── */
    .panel {
      display: none;
      width: 100%;
      max-width: 960px;
      padding: 0 40px 80px;
    }

    .panel.active {
      display: block;
    }

    /* ── START BUTTON ── */
    .start-wrap {
      display: flex;
      justify-content: flex-start;
      padding: 32px 0 8px;
    }

    .start-btn {
      background: transparent;
      border: 1px solid var(--green);
      color: var(--green);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 12px 36px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .start-btn:hover {
      background: var(--green);
      color: #000;
    }

    .start-btn.hidden {
      display: none;
    }

    .restart-btn {
      background: transparent;
      border: 1px solid #444;
      color: #888;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 12px 36px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    .restart-btn:hover {
      border-color: var(--green);
      color: var(--green);
    }

    /* ── FLOW ── */
    .flow {
      display: flex;
      flex-direction: column;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .flow.visible {
      opacity: 1;
    }

    /* ── STEP ── */
    .step {
      display: flex;
      align-items: flex-start;
      gap: 24px;
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 0.5s ease, transform 0.5s ease;
      padding: 22px 0;
      position: relative;
    }

    .step.show {
      opacity: 1;
      transform: translateY(0);
    }

    .step:not(:last-child)::after {
      content: '';
      position: absolute;
      left: 19px;
      bottom: -1px;
      width: 1px;
      height: 22px;
      background: var(--border);
    }

    .step-index {
      width: 40px;
      height: 40px;
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--muted);
      flex-shrink: 0;
      margin-top: 2px;
      transition: border-color 0.4s, color 0.4s;
    }

    .step.show .step-index {
      border-color: var(--green);
      color: var(--green);
    }

    .step-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .step-label {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .step-text {
      font-family: 'Fraunces', serif;
      font-weight: 300;
      font-size: clamp(15px, 2vw, 21px);
      line-height: 1.5;
      color: var(--text);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
    }

    .step-note {
      font-size: 11px;
      color: #ccc;
      line-height: 1.6;
      border-left: 1px solid var(--border);
      padding-left: 12px;
    }

    /* ── DRUM ── */
    .drum-wrapper {
      display: inline-flex;
      align-items: center;
      vertical-align: middle;
    }

    .drum {
      display: inline-block;
      height: 36px;
      overflow: hidden;
      border-bottom: 2px solid var(--green);
      min-width: 80px;
      vertical-align: middle;
    }

    .drum-inner {
      display: flex;
      flex-direction: column;
      transition: transform 0.05s linear;
      will-change: transform;
    }

    .drum-item {
      height: 36px;
      line-height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: clamp(15px, 2vw, 20px);
      padding: 0 8px;
      color: var(--green);
    }

    .drum-item.c-ge {
      color: var(--accent-ge);
    }

    .drum-item.c-ra {
      color: var(--accent-ra);
    }

    .drum-item.c-fj {
      color: var(--accent-fj);
    }

    .drum-item.c-hb {
      color: var(--accent-hb);
    }

    .drum-item.c-bi {
      color: var(--accent-bi);
    }

    .drum-item.c-tic {
      color: var(--accent-tic);
    }

    .drum-item.c-th {
      color: var(--accent-th);
    }

    .drum-item.c-rse {
      color: var(--accent-rse);
    }

    .drum-item.c-com {
      color: var(--accent-com);
    }

    .drum-item.c-otro {
      color: var(--accent-otro);
    }

    .drum-item.c-canal {
      color: var(--canal);
    }

    .drum-item.c-dept {
      color: var(--dept);
    }

    /* ── INTERACTIVE DEPT SELECTOR ── */
    .dept-selector {
      border: 1px solid var(--border);
      background: #0d0d0d;
      padding: 20px 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .dept-selector-label {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .dept-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .dept-chip {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      padding: 6px 14px;
      cursor: pointer;
      color: var(--muted);
      background: transparent;
      transition: all 0.18s;
      user-select: none;
    }

    .dept-chip:hover {
      border-color: var(--dept);
      color: var(--dept);
    }

    .dept-chip.selected {
      border-color: var(--dept);
      color: #000;
      background: var(--dept);
    }

    .dept-chip.locked {
      border-color: var(--green);
      color: #000;
      background: var(--green);
      cursor: default;
    }

    .dept-selected-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      border-top: 1px solid var(--border);
      padding-top: 14px;
    }

    .dept-selected-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 12px;
      color: #ddd;
      line-height: 1.5;
    }

    .dept-selected-item .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--dept);
      flex-shrink: 0;
      margin-top: 5px;
    }

    .dept-selected-item .dot.locked {
      background: var(--green);
    }

    .dept-validator {
      color: var(--muted);
      font-size: 11px;
    }

    /* ── DECISION BLOCK ── */
    .decision-block {
      border: 1px solid var(--border);
      background: #0d0d0d;
      padding: 18px 22px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .decision-branch {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .branch-label {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      padding-bottom: 6px;
      margin-bottom: 4px;
    }

    .branch-yes {
      border-left: 2px solid var(--green);
      padding-left: 12px;
    }

    .branch-no {
      border-left: 2px solid var(--red);
      padding-left: 12px;
    }

    .branch-content {
      font-size: 13px;
      line-height: 1.6;
      color: #e0e0e0;
    }

    /* ── PARALLEL BLOCK ── */
    .parallel-block {
      border: 1px solid var(--border);
      background: #0d0d0d;
      padding: 18px 22px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .parallel-label {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .parallel-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .parallel-item {
      flex: 1;
      min-width: 150px;
      border: 1px solid var(--border);
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .parallel-item-name {
      font-family: 'Fraunces', serif;
      font-size: 14px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .parallel-item-sub {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .parallel-item-validator {
      font-size: 11px;
      color: #bbb;
      margin-top: 3px;
    }

    .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }

    .dot.blue {
      background: var(--blue);
    }

    .dot.green {
      background: var(--green);
    }

    .dot.canal {
      background: var(--canal);
    }

    /* ── FINAL BLOCK ── */
    .final-block {
      border: 1px solid #2a2a2a;
      background: linear-gradient(135deg, #111 0%, #0d0d0d 100%);
      padding: 22px;
    }

    .final-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .final-card {
      flex: 1;
      min-width: 140px;
      border: 1px solid var(--border);
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      position: relative;
      overflow: hidden;
    }

    .final-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--green);
      opacity: 0.7;
    }

    .final-card-name {
      font-family: 'Fraunces', serif;
      font-size: 14px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .final-card-sub {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── STATUS ── */
    .status-bar {
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 28px 0 0 64px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.3
      }
    }

    /* ── SUBTABS ── */
    .subtabs-wrap {
      width: 100%;
      max-width: 960px;
      padding: 0 40px;
      display: flex;
      gap: 0;
      border-bottom: 1px solid #1e1e1e;
      background: #0a0a0a;
    }

    .subtab {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #555;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 9px 18px 12px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      margin-bottom: -1px;
      white-space: nowrap;
    }

    .subtab:hover {
      color: var(--muted);
    }

    .subtab.active {
      color: var(--text);
      border-bottom-color: var(--accent-tic);
    }

    /* ── MAIN PANELS ── */
    .main-panel {
      display: none;
      width: 100%;
      max-width: 960px;
    }

    .main-panel.active {
      display: block;
    }

    .subpanel {
      display: none;
      padding: 0 40px 80px;
    }

    .subpanel.active {
      display: block;
    }

    /* ── ORG NODE CLICK-EXPAND handled via .org-node-drawer in organigrama CSS above ── */

    @media (max-width: 600px) {

      header,
      .tabs-wrap,
      .subtabs-wrap,
      .main-panel {
        padding-left: 20px;
        padding-right: 20px;
      }

      .subtabs-wrap {
        padding-left: 20px;
        padding-right: 20px;
      }

      .subpanel {
        padding-left: 20px;
        padding-right: 20px;
      }

      .decision-block {
        grid-template-columns: 1fr;
      }

      .tab {
        padding: 10px 12px 14px;
        font-size: 10px;
      }
    }

    */

    /* ── ORGANIGRAMA ── */
    #org-root {
      padding: 52px 40px 80px;
      width: 100%;
      max-width: 960px;
    }

    .org-intro {
      margin-bottom: 40px;
    }

    .org-intro-label {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .org-intro-title {
      font-family: 'Fraunces', serif;
      font-weight: 300;
      font-size: clamp(18px, 2.5vw, 26px);
      color: var(--text);
      margin-bottom: 10px;
    }

    .org-intro-note {
      font-size: 11px;
      color: #aaa;
      line-height: 1.7;
      border-left: 1px solid var(--border);
      padding-left: 12px;
      max-width: 600px;
    }

    /* Legend */
    .org-legend {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }

    .org-legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .org-legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .ld-dir {
      background: var(--green);
    }

    .ld-int {
      background: var(--accent-com);
    }

    .ld-mkt {
      background: var(--canal);
    }

    .ld-field {
      background: var(--accent-ra);
    }

    .ld-ext {
      background: var(--accent-tic);
    }

    /* Director */
    .org-director-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 0;
    }

    .org-director-node {
      border: 1px solid var(--green);
      background: #0a140a;
      padding: 16px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      min-width: 280px;
      position: relative;
    }

    .org-director-label {
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 15px;
      color: var(--green);
      text-align: center;
    }

    .org-director-sub {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-align: center;
    }

    /* Connector from director to pillars */
    .org-connector-v {
      width: 1px;
      height: 28px;
      background: var(--border);
      margin: 0 auto;
    }

    .org-connector-h-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 20px;
      margin-bottom: 0;
      position: relative;
    }

    .org-connector-h-wrap::before {
      content: '';
      position: absolute;
      top: 0;
      left: calc(16.67% + 10px);
      right: calc(16.67% + 10px);
      height: 1px;
      background: var(--border);
    }

    .org-pillar-connector {
      display: flex;
      justify-content: center;
      padding-top: 0;
    }

    .org-pillar-connector::before {
      content: '';
      display: block;
      width: 1px;
      height: 20px;
      background: var(--border);
    }

    /* Pillars */
    .org-pillars {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 20px;
      margin-bottom: 28px;
    }

    .org-pillar {
      border: 1px solid var(--border);
      background: #0d0d0d;
      display: flex;
      flex-direction: column;
    }

    .org-pillar-header {
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .org-pillar-num {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .org-pillar-title {
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 13px;
      color: var(--text);
    }

    .org-pillar-sub {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.06em;
      margin-top: 1px;
    }

    .org-pillar-body {
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }

    /* Nodes */
    .org-node {
      padding: 9px 11px 9px 14px;
      border: 1px solid var(--border);
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      gap: 2px;
      cursor: pointer;
      transition: border-color 0.18s, background 0.18s;
      position: relative;
      overflow: hidden;
    }

    .org-node:hover {
      background: #131313;
      border-color: #3a3a3a;
    }

    .org-node.expanded {
      border-color: #3a3a3a;
      background: #101010;
    }

    .org-node-accent {
      position: absolute;
      top: 0;
      left: 0;
      width: 3px;
      height: 100%;
    }

    .acc-dir {
      background: var(--green);
    }

    .acc-int {
      background: var(--accent-com);
    }

    .acc-mkt {
      background: var(--canal);
    }

    .acc-field {
      background: var(--accent-ra);
    }

    .acc-ext {
      background: var(--accent-tic);
    }

    .org-node-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .org-node-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
    }

    .org-node-label {
      font-size: 11px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.03em;
      line-height: 1.3;
    }

    .org-node-sub {
      font-size: 9px;
      color: #666;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .org-node-chevron {
      font-size: 9px;
      color: #444;
      flex-shrink: 0;
      margin-top: 2px;
      transition: color 0.2s, transform 0.2s;
      line-height: 1;
    }

    .org-node.expanded .org-node-chevron {
      color: var(--green);
      transform: rotate(180deg);
    }

    /* Drawer */
    .org-node-drawer {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease, opacity 0.3s ease, padding 0.3s ease;
      opacity: 0;
      font-size: 10px;
      color: #888;
      line-height: 1.7;
      border-top: 0px solid transparent;
    }

    .org-node.expanded .org-node-drawer {
      max-height: 200px;
      opacity: 1;
      padding-top: 8px;
      border-top: 1px solid #1e1e1e;
      margin-top: 6px;
    }

    .org-group-label {
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #444;
      padding: 8px 0 2px;
    }

    /* Waldorf */
    .org-waldorf-section {
      margin-top: 8px;
      border: 1px dashed #2a2a3a;
      padding: 16px 18px;
      background: #08080f;
      position: relative;
    }

    .org-waldorf-section::before {
      content: '';
      position: absolute;
      top: -28px;
      left: 50%;
      width: 1px;
      height: 28px;
      background: #2a2a3a;
    }

    .org-waldorf-top {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 12px;
    }

    .org-waldorf-badge {
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 13px;
      color: var(--accent-tic);
      border: 1px solid var(--accent-tic);
      padding: 4px 10px;
    }

    .org-waldorf-desc {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .org-waldorf-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 5px;
    }

    .org-waldorf-chip {
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent-tic);
      border: 1px solid #20203a;
      padding: 5px 9px;
      background: #0a0a18;
    }

    /* Verticales */
    .org-verticales-section {
      margin-top: 32px;
      border-top: 1px solid var(--border);
      padding-top: 24px;
    }

    .org-verticales-label {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 14px;
    }

    .org-verticales-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .org-vertical-chip {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 1px solid;
      padding: 6px 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .org-vertical-chip.active {
      border-color: #3a3a3a;
      color: var(--text);
      background: #0d0d0d;
    }

    .org-vertical-chip.inactive {
      border-color: #1e1e1e;
      color: #333;
      background: transparent;
    }

    .org-vertical-sub {
      font-size: 8px;
      letter-spacing: 0.08em;
      color: #555;
    }

    .org-vertical-chip.inactive .org-vertical-sub {
      color: #2a2a2a;
    }

    /* Decisions note */
    .org-decisions {
      margin-top: 28px;
      font-size: 10px;
      color: #444;
      line-height: 1.9;
      border-left: 1px solid #1e1e1e;
      padding-left: 12px;
    }

    .org-decisions strong {
      color: #666;
      font-weight: 500;
    }

    @media (max-width: 720px) {

      .org-pillars,
      .org-connector-h-wrap {
        grid-template-columns: 1fr;
      }

      .org-connector-h-wrap::before {
        display: none;

    @media (max-width: 860px) {
      .org-pillars {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 960px) {

      .tabs-wrap,
      .subtabs-wrap {
        overflow-x: auto;
        flex-wrap: nowrap;
      }

      .tab,
      .subtab {
        white-space: nowrap;
      }
    }

    @media (max-width: 600px) {

      header,
      .tabs-wrap,
      .subtabs-wrap {
        padding-left: 16px;
        padding-right: 16px;
      }

      .subpanel {
        padding-left: 16px;
        padding-right: 16px;
      }

      .decision-block {
        grid-template-columns: 1fr;
      }

      .tab {
        padding: 10px 12px 14px;
        font-size: 9px;
      }

      .subtab {
        padding: 8px 10px 10px;
        font-size: 9px;
      }

      #org-root,
      #org-actual-root,
      #org-integrado-root {
        padding: 20px 16px 60px;
      }

      .org-director-node {
        min-width: unset;
        padding: 12px 16px;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="header-label">Grupo Educación — Comunicación, Marketing y Comercial</div>
    <h1>Estructura y flujos operativos</h1>
  </header>

  <div class="tabs-wrap">
    <button class="tab active" onclick="switchMain(0)"><span class="tab-num">01</span>Organigrama actual</button>
    <button class="tab" onclick="switchMain(1)"><span class="tab-num">02</span>Organigrama ideal</button>
    <button class="tab" onclick="switchMain(2)"><span class="tab-num">03</span>Organigrama integrado</button>
    <button class="tab" onclick="switchMain(3)"><span class="tab-num">04</span>Flujos Waldorf</button>
  </div>

  <!-- Sub-tabs for Flujos, hidden when on Organigrama -->
  <div class="subtabs-wrap" id="subtabs-wrap" style="display:none;">
    <button class="subtab active" onclick="switchFlow(0)">Brochure Fundaju</button>
    <button class="subtab" onclick="switchFlow(1)">Campaña Colegios</button>
    <button class="subtab" onclick="switchFlow(2)">Cobertura HABLA</button>
    <button class="subtab" onclick="switchFlow(3)">Desarrollo Web</button>
  </div>

  <div class="main-panel active" id="main-0">
    <div id="org-actual-root"></div>
  </div>

  <div class="main-panel" id="main-1" style="padding-top:40px;">
    <div id="org-root"></div>
  </div>

  <div class="main-panel" id="main-2">
    <div id="org-integrado-root"></div>
  </div>

  <div class="main-panel" id="main-3" style="padding-top:8px;">
    <div class="subpanel active" id="subpanel-0">
      <div class="start-wrap">
        <button class="start-btn" id="btn-0" onclick="startFlow(0)">▶ &nbsp;Iniciar flujo</button>
        <button class="restart-btn" id="restart-0" onclick="restartFlow(0)" style="display:none;">↺ &nbsp;Reiniciar
          flujo</button>
      </div>
      <div class="flow" id="flow-0"></div>
    </div>
    <div class="subpanel" id="subpanel-1">
      <div class="start-wrap">
        <button class="start-btn" id="btn-1" onclick="startFlow(1)">▶ &nbsp;Iniciar flujo</button>
        <button class="restart-btn" id="restart-1" onclick="restartFlow(1)" style="display:none;">↺ &nbsp;Reiniciar
          flujo</button>
      </div>
      <div class="flow" id="flow-1"></div>
    </div>
    <div class="subpanel" id="subpanel-2">
      <div class="start-wrap">
        <button class="start-btn" id="btn-2" onclick="startFlow(2)">▶ &nbsp;Iniciar flujo</button>
        <button class="restart-btn" id="restart-2" onclick="restartFlow(2)" style="display:none;">↺ &nbsp;Reiniciar
          flujo</button>
      </div>
      <div class="flow" id="flow-2"></div>
    </div>
    <div class="subpanel" id="subpanel-3">
      <div class="start-wrap">
        <button class="start-btn" id="btn-3" onclick="startFlow(3)">▶ &nbsp;Iniciar flujo</button>
        <button class="restart-btn" id="restart-3" onclick="restartFlow(3)" style="display:none;">↺ &nbsp;Reiniciar
          flujo</button>
      </div>
      <div class="flow" id="flow-3"></div>
    </div>
  </div>

  <script>
    // ─── CONSTANTS ───────────────────────────────────────────────────────────────

    const STEP_GAP = 2890; // ms between steps (15% faster than original 3400)

    const VERTICALS = [
      { label: 'Grupo Educación', cls: 'c-ge' },
      { label: 'Red Aprende', cls: 'c-ra' },
      { label: 'Fundaju', cls: 'c-fj' },
      { label: 'HABLA', cls: 'c-hb' },
      { label: 'Base Inmobiliaria', cls: 'c-bi' },
      { label: 'TIC', cls: 'c-tic' },
      { label: 'Talento Humano', cls: 'c-th' },
      { label: 'RSE', cls: 'c-rse' },
      { label: 'Comunicación', cls: 'c-com' },
      { label: 'Otro', cls: 'c-otro' },
      { label: 'Marketing', cls: 'c-canal' },
    ];

    const CHANNELS = [
      { label: 'Junta / Videollamada', cls: 'c-canal' },
      { label: 'Correo electrónico', cls: 'c-canal' },
      { label: 'Brief', cls: 'c-canal' },
    ];

    const ALL_DEPTS = [
      { id: 'editorial', label: 'Editorial', validator: 'Dirección de Comunicación' },
      { id: 'copy', label: 'Copy', validator: 'Dirección de Comunicación' },
      { id: 'diseno', label: 'Diseño Gráfico', validator: 'Dirección de Arte' },
      { id: 'audiovisual', label: 'Audiovisual', validator: 'Dirección de Arte' },
      { id: 'desarrollo', label: 'Desarrollo', validator: 'TIC' },
      { id: 'seo', label: 'SEO / SEM', validator: 'Dirección de Comunicación' },
      { id: 'datos', label: 'Analista de Datos', validator: 'Dirección de Comunicación' },
      { id: 'pauta', label: 'Especialista en Pauta', validator: 'Dirección de Comunicación' },
      { id: 'community', label: 'Community Manager', validator: 'Dirección de Comunicación' },
      { id: 'pm', label: 'Project Manager', validator: 'Dirección de Comunicación' },
      { id: 'research', label: 'Research e Innovación', validator: 'Dirección de Comunicación' },
      { id: 'fotovideo', label: 'Fotógrafo / Videógrafo', validator: 'Dirección de Arte' },
      { id: 'creativo', label: 'Creativo / Estratega', validator: 'Dirección de Comunicación' },
      { id: 'uxui', label: 'Diseño UX / UI', validator: 'Dirección de Arte' },
    ];

    // ─── TABS ────────────────────────────────────────────────────────────────────

    // ─── NAVIGATION ──────────────────────────────────────────────────────────────

    function switchMain(idx) {
      document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
      document.querySelectorAll('.main-panel').forEach((p, i) => p.classList.toggle('active', i === idx));
      const subtabs = document.getElementById('subtabs-wrap');
      subtabs.style.display = idx === 3 ? 'flex' : 'none';
      if (idx === 0) renderOrgActual();
      if (idx === 1) renderOrg();
      if (idx === 2) renderOrgIntegrado();
    }

    let activeFlow = 0;
    function switchFlow(idx) {
      document.querySelectorAll('.subtab').forEach((t, i) => t.classList.toggle('active', i === idx));
      document.querySelectorAll('.subpanel').forEach((p, i) => p.classList.toggle('active', i === idx));
      activeFlow = idx;
    }

    // ─── DRUM ────────────────────────────────────────────────────────────────────

    function createDrum(items, finalIndex) {
      const wrapper = document.createElement('span');
      wrapper.className = 'drum-wrapper';
      const drum = document.createElement('span');
      drum.className = 'drum';
      const inner = document.createElement('div');
      inner.className = 'drum-inner';

      // 2 full rotations through all items, then land on final
      const spinItems = [];
      for (let i = 0; i < items.length * 2; i++) spinItems.push(items[i % items.length]);
      spinItems.push(items[finalIndex]);

      spinItems.forEach(it => {
        const el = document.createElement('div');
        el.className = `drum-item ${it.cls}`;
        el.textContent = it.label;
        inner.appendChild(el);
      });

      drum.appendChild(inner);
      wrapper.appendChild(drum);
      wrapper._inner = inner;
      wrapper._totalItems = spinItems.length;
      return wrapper;
    }

    function spinDrum(wrapper) {
      return new Promise(resolve => {
        const inner = wrapper._inner;
        const total = wrapper._totalItems;
        const target = total - 1;
        const ITEM_H = 36; // fixed px, matches CSS
        let current = 0;

        function tick() {
          if (current >= target) {
            inner.style.transition = 'transform 0.4s cubic-bezier(0.22,1,0.36,1)';
            inner.style.transform = `translateY(-${target * ITEM_H}px)`;
            setTimeout(resolve, 480);
            return;
          }
          const progress = current / (total - 1);
          const delay = progress < 0.6 ? 35 + progress * 15 : 55 + (progress - 0.6) * 220;
          inner.style.transition = `transform ${delay}ms linear`;
          inner.style.transform = `translateY(-${current * ITEM_H}px)`;
          current++;
          setTimeout(tick, delay);
        }
        tick();
      });
    }

    // ─── HELPERS ─────────────────────────────────────────────────────────────────

    async function pause(ms) { return new Promise(r => setTimeout(r, ms)); }

    async function revealStep(el, delay = 0) {
      await pause(delay);
      el.classList.add('show');
    }

    function makeStep(index, labelText) {
      const step = document.createElement('div');
      step.className = 'step';
      const idx = document.createElement('div');
      idx.className = 'step-index';
      idx.textContent = String(index).padStart(2, '0');
      const body = document.createElement('div');
      body.className = 'step-body';
      const lbl = document.createElement('div');
      lbl.className = 'step-label';
      lbl.textContent = labelText;
      body.appendChild(lbl);
      step.appendChild(idx);
      step.appendChild(body);
      return { step, body };
    }

    function makeStepText(...nodes) {
      const el = document.createElement('div');
      el.className = 'step-text';
      nodes.forEach(n => {
        if (typeof n === 'string') el.appendChild(document.createTextNode(n));
        else el.appendChild(n);
      });
      return el;
    }

    function makeNote(text) {
      const el = document.createElement('div');
      el.className = 'step-note';
      el.textContent = text;
      return el;
    }

    function makeDecision(yesTxt, noTxt) {
      const block = document.createElement('div');
      block.className = 'decision-block';
      block.innerHTML = `
    <div class="decision-branch branch-yes">
      <div class="branch-label">✓ &nbsp;Si queda validado</div>
      <div class="branch-content">${yesTxt}</div>
    </div>
    <div class="decision-branch branch-no">
      <div class="branch-label">✗ &nbsp;Si no queda validado</div>
      <div class="branch-content">${noTxt}</div>
    </div>`;
      return block;
    }

    function makeParallel(deptIds, extraNote) {
      const block = document.createElement('div');
      block.className = 'parallel-block';
      const lbl = document.createElement('div');
      lbl.className = 'parallel-label';
      lbl.textContent = '— Activación simultánea';
      block.appendChild(lbl);
      const row = document.createElement('div');
      row.className = 'parallel-row';
      deptIds.forEach(id => {
        const d = ALL_DEPTS.find(x => x.id === id);
        if (!d) return;
        const item = document.createElement('div');
        item.className = 'parallel-item';
        item.innerHTML = `
      <div class="parallel-item-name"><span class="dot blue"></span>${d.label}</div>
      <div class="parallel-item-validator">Valida: ${d.validator}</div>`;
        row.appendChild(item);
      });
      block.appendChild(row);
      if (extraNote) {
        const n = document.createElement('div');
        n.className = 'step-note';
        n.style.marginTop = '4px';
        n.textContent = extraNote;
        block.appendChild(n);
      }
      return block;
    }

    function makeFinal(cards) {
      const block = document.createElement('div');
      block.className = 'final-block';
      const row = document.createElement('div');
      row.className = 'final-row';
      cards.forEach(c => {
        row.innerHTML += `
      <div class="final-card">
        <div class="final-card-name"><span class="dot green"></span>${c.name}</div>
        <div class="final-card-sub">${c.sub}</div>
      </div>`;
      });
      block.appendChild(row);
      return block;
    }

    function makeStatus(text) {
      const el = document.createElement('div');
      el.className = 'status-bar';
      el.innerHTML = `<span class="status-dot"></span>${text}`;
      return el;
    }

    function makeBottomRestart(idx) {
      const wrap = document.createElement('div');
      wrap.style.cssText = 'padding: 28px 0 0 64px;';
      const btn = document.createElement('button');
      btn.className = 'restart-btn';
      btn.textContent = '↺  Reiniciar flujo';
      btn.onclick = () => restartFlow(idx);
      wrap.appendChild(btn);
      return wrap;
    }

    // lockedIds   = requeridos, siempre encendidos en verde, no se pueden apagar
    // selectedIds = activados por defecto en azul, se pueden apagar
    // Los demas 14 departamentos aparecen apagados y se pueden encender
    function makeDeptSelector(lockedIds, selectedIds) {
      const selector = document.createElement('div');
      selector.className = 'dept-selector';

      const lbl = document.createElement('div');
      lbl.className = 'dept-selector-label';
      lbl.textContent = '-- Departamentos de Comunicacion';
      selector.appendChild(lbl);

      const note = document.createElement('div');
      note.style.cssText = 'font-size:11px;color:#888;margin-bottom:8px;';
      note.textContent = 'Verde = requerido para este flujo. Azul = activo por defecto, puede desactivarse. Gris = disponible, puede activarse.';
      selector.appendChild(note);

      const chips = document.createElement('div');
      chips.className = 'dept-chips';

      const activeSet = new Set([...lockedIds, ...selectedIds]);

      const listWrap = document.createElement('div');
      listWrap.className = 'dept-selected-list';

      function renderList() {
        listWrap.innerHTML = '';
        ALL_DEPTS.filter(d => activeSet.has(d.id)).forEach(d => {
          const isLocked = lockedIds.includes(d.id);
          listWrap.innerHTML += '<div class="dept-selected-item"><span class="dot ' + (isLocked ? 'locked' : '') + '"></span><span><strong style="color:' + (isLocked ? 'var(--green)' : 'var(--dept)') + '">' + d.label + '</strong><span class="dept-validator"> -- Valida: ' + d.validator + '</span></span></div>';
        });
        if (activeSet.size === 0) {
          listWrap.innerHTML = '<div style="font-size:11px;color:#555;">Ningun departamento activado.</div>';
        }
      }

      ALL_DEPTS.forEach(d => {
        const chip = document.createElement('button');
        const isLocked = lockedIds.includes(d.id);
        const isSelected = selectedIds.includes(d.id);
        if (isLocked) chip.className = 'dept-chip locked';
        else if (isSelected) chip.className = 'dept-chip selected';
        else chip.className = 'dept-chip';
        chip.textContent = d.label;
        chip.dataset.id = d.id;
        if (!isLocked) {
          chip.addEventListener('click', () => {
            if (activeSet.has(d.id)) { activeSet.delete(d.id); chip.classList.remove('selected'); }
            else { activeSet.add(d.id); chip.classList.add('selected'); }
            renderList();
          });
        }
        chips.appendChild(chip);
      });

      selector.appendChild(chips);
      selector.appendChild(listWrap);
      renderList();
      return selector;
    }

    // ─── FLOW 0: BROCHURE NUEVO ──────────────────────────────────────────────────

    async function buildFlow0() {
      const flow = document.getElementById('flow-0');
      flow.innerHTML = '';
      flow.classList.add('visible');

      // Step 1
      const drum1 = createDrum(VERTICALS, 2); // Fundaju
      const { step: s1, body: b1 } = makeStep(1, 'Origen de la solicitud');
      b1.appendChild(makeStepText('La dirección de ', drum1, ' realiza una solicitud de brochure nuevo.'));
      b1.appendChild(makeNote('Dirección Fundaju inicia el proceso.'));
      flow.appendChild(s1);
      await revealStep(s1, 200);
      await spinDrum(drum1);
      await pause(STEP_GAP);

      // Step 2
      const drum2 = createDrum(CHANNELS, FLOW_CHANNEL[0]); // Junta/Videollamada
      const { step: s2, body: b2 } = makeStep(2, 'Canal de entrada');
      b2.appendChild(makeStepText('La solicitud llega al Depto. de Comunicación vía ', drum2, '.'));
      b2.appendChild(makeNote('Canales disponibles: junta / videollamada, correo electrónico, brief.'));
      flow.appendChild(s2);
      await revealStep(s2, 200);
      await spinDrum(drum2);
      await pause(STEP_GAP);

      // Step 3
      const { step: s3, body: b3 } = makeStep(3, 'Producción del brochure');
      b3.appendChild(makeStepText('Comunicación activa en paralelo a los departamentos de producción.'));
      b3.appendChild(makeDeptSelector(
        ['editorial', 'copy', 'diseno'],
        ['audiovisual', 'pm', 'research']
      ));
      flow.appendChild(s3);
      await revealStep(s3, 200);
      await pause(STEP_GAP);

      // Step 4
      const { step: s4, body: b4 } = makeStep(4, 'Validación interna');
      b4.appendChild(makeStepText('Los entregables pasan por validación antes de la versión final.'));
      b4.appendChild(makeDecision(
        'Se produce la versión final del brochure y se envía a Dirección Fundaju para visto bueno.',
        'El entregable regresa al departamento correspondiente para correcciones. El ciclo se repite hasta obtener aprobación.'
      ));
      flow.appendChild(s4);
      await revealStep(s4, 200);
      await pause(STEP_GAP);

      // Step 5
      const { step: s5, body: b5 } = makeStep(5, 'Visto bueno — Dirección Fundaju');
      b5.appendChild(makeStepText('La versión final se envía a Dirección Fundaju para visto bueno.'));
      b5.appendChild(makeDecision(
        'El brochure queda aprobado. El proceso continúa hacia publicación y almacenamiento.',
        'Dirección Fundaju devuelve comentarios. El proceso regresa a producción para ajuste y nueva validación.'
      ));
      flow.appendChild(s5);
      await revealStep(s5, 200);
      await pause(STEP_GAP);

      // Step 6
      const drum3 = createDrum(ALL_DEPTS.map(d => ({ label: d.label, cls: 'c-dept' })), 4); // Desarrollo
      const { step: s6, body: b6 } = makeStep(6, 'Publicación en sitio web');
      b6.appendChild(makeStepText('El brochure aprobado pasa al departamento de ', drum3, ', que lo publica en el sitio web.'));
      b6.appendChild(makeNote('Desarrollo sube el brochure al sitio correspondiente de Fundaju.'));
      flow.appendChild(s6);
      await revealStep(s6, 200);
      await spinDrum(drum3);
